<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>販売集計アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --border: #252a38;
    --accent: #f5c842;
    --accent-dim: rgba(245,200,66,0.12);
    --text: #e8eaf0;
    --muted: #6b7280;
    --success: #34d399;
    --danger: #f87171;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Noto Sans JP’, sans-serif;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 24px;
background-image:
radial-gradient(ellipse 60% 40% at 80% 10%, rgba(245,200,66,0.06) 0%, transparent 60%),
radial-gradient(ellipse 50% 50% at 10% 90%, rgba(100,130,255,0.04) 0%, transparent 60%);
}

.card {
width: 100%;
max-width: 480px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
overflow: hidden;
box-shadow: 0 24px 64px rgba(0,0,0,0.5);
}

/* Header */
.header {
padding: 28px 32px 24px;
border-bottom: 1px solid var(–border);
position: relative;
}
.header::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 3px;
background: linear-gradient(90deg, var(–accent), transparent);
}
.header-label {
font-size: 11px;
font-weight: 500;
letter-spacing: 0.15em;
color: var(–accent);
text-transform: uppercase;
margin-bottom: 6px;
}
.header-title {
font-size: 22px;
font-weight: 700;
color: var(–text);
}
.unit-price-badge {
display: inline-flex;
align-items: center;
gap: 6px;
margin-top: 10px;
background: var(–accent-dim);
border: 1px solid rgba(245,200,66,0.25);
border-radius: 6px;
padding: 4px 10px;
font-family: ‘DM Mono’, monospace;
font-size: 12px;
color: var(–accent);
}

/* Body */
.body { padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; }

/* Form field */
.field { display: flex; flex-direction: column; gap: 7px; }
.label {
font-size: 12px;
font-weight: 500;
letter-spacing: 0.06em;
color: var(–muted);
text-transform: uppercase;
}

input[type=“number”], select, input[type=“url”] {
background: var(–bg);
border: 1px solid var(–border);
border-radius: 10px;
color: var(–text);
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 15px;
padding: 12px 14px;
width: 100%;
outline: none;
transition: border-color 0.2s;
-webkit-appearance: none;
}
input[type=“number”] {
font-family: ‘DM Mono’, monospace;
font-size: 20px;
letter-spacing: 0.04em;
}
input[type=“number”]:focus, select:focus, input[type=“url”]:focus {
border-color: var(–accent);
box-shadow: 0 0 0 3px rgba(245,200,66,0.1);
}
select option { background: #1e2230; }

/* Total display */
.total-box {
background: var(–bg);
border: 1px solid var(–border);
border-radius: 12px;
padding: 18px 20px;
display: flex;
align-items: center;
justify-content: space-between;
}
.total-label { font-size: 13px; color: var(–muted); }
.total-amount {
font-family: ‘DM Mono’, monospace;
font-size: 28px;
font-weight: 500;
color: var(–accent);
letter-spacing: 0.02em;
transition: all 0.2s;
}

/* Webhook field */

/* Buttons */
.btn {
width: 100%;
padding: 15px 16px;
border: none;
border-radius: 10px;
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 15px;
font-weight: 700;
cursor: pointer;
transition: all 0.15s;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
letter-spacing: 0.03em;
}
.btn:active { transform: scale(0.98); }

.btn-send {
background: var(–accent);
color: #0d0f14;
}
.btn-send:hover { background: #f7d060; }
.btn-send.done { background: var(–success); color: #0d0f14; }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

/* Toast */
.toast {
position: fixed;
bottom: 24px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: #1e2230;
border: 1px solid var(–border);
border-radius: 10px;
padding: 12px 20px;
font-size: 13px;
font-weight: 500;
color: var(–text);
box-shadow: 0 8px 32px rgba(0,0,0,0.4);
transition: transform 0.3s ease;
z-index: 100;
white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(–success); color: var(–success); }
.toast.error { border-color: var(–danger); color: var(–danger); }

.divider {
border: none;
border-top: 1px solid var(–border);
}
</style>

</head>
<body>

<script>
  const UNIT_PRICE = 100000;

  // ── 合計更新 ──
  function updateTotal() {
    const qty = parseInt(document.getElementById('qty').value) || 0;
    const total = qty * UNIT_PRICE;
    document.getElementById('total').textContent =
      '¥' + total.toLocaleString('ja-JP');
  }
  document.getElementById('qty').addEventListener('input', updateTotal);

  // ── 送信＋コピー 統合 ──
  async function sendAll() {
    const staff = document.getElementById('staff').value;
    const buyer = document.getElementById('buyer').value.trim();
    const qty   = parseInt(document.getElementById('qty').value) || 0;
    const total = qty * UNIT_PRICE;
    const url   = 'https://discord.com/api/webhooks/1494932108735680552/-ohxDtMzxVqchBoPQ9EIrRfT2Ee_ev-H8UeAL22_bvEbP9k7jxytXsRjaKQ9HpnXkfWU';

    if (!staff)  { showToast('スタッフを選択してください', 'error'); return; }
    if (!buyer)  { showToast('購入者名を入力してください', 'error');  return; }
    if (qty <= 0){ showToast('個数を入力してください', 'error');      return; }

    const now = new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });

    const payload = {
      embeds: [{
        title: '📦 販売結果レポート',
        color: 0xf5c842,
        fields: [
          { name: '👤 担当スタッフ', value: staff,                               inline: true  },
          { name: '🛒 購入者',       value: buyer,                               inline: true  },
          { name: '📦 販売個数',     value: `${qty} 個`,                         inline: true  },
          { name: '💰 合計金額',     value: `¥${total.toLocaleString('ja-JP')}`,  inline: false },
        ],
        footer: { text: `送信日時: ${now}` }
      }]
    };

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;

    // コピー
    await navigator.clipboard.writeText(total.toLocaleString('ja-JP'));

    // Discord 送信
    let discordOk = false;
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      discordOk = res.ok || res.status === 204;
    } catch(e) {}

    // ボタン演出
    btn.classList.add('done');
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> 送信完了`;
    showToast(discordOk ? 'コピー＆Discord通知 完了 ✓' : 'コピー完了（Discord送信失敗）', discordOk ? 'success' : 'error');

    setTimeout(() => {
      btn.classList.remove('done');
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 販売結果を送信`;
      btn.disabled = false;
    }, 2500);
  }

  // ── Toast ──
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = 'toast', 2800);
  }
</script>

</body>
